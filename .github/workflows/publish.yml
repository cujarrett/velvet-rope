name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish # require manual approval gate in GitHub

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # don't expose GITHUB_TOKEN to later steps

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # no cache: intentional — cache can be poisoned by fork PRs

      - run: npm ci --ignore-scripts # ignore-scripts prevents postinstall supply chain attacks

      - run: npm run build

      - run: npm test

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
